<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCraftHub: Your Learning Management Platform</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5CF6;
      --primary-dark: #7C3AED;
      --primary-light: #A78BFA;
      --primary-bg: #F5F3FF;
      --success: #F59E0B;
      --success-light: #FDE68A;
      --success-bg: #FFFBEB;
      --danger: #EF4444;
      --danger-dark: #DC2626;
      --danger-light: #FCA5A5;
      --danger-bg: #FEF2F2;
      --text-primary: #1E1B4B;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --bg-body: #F9FAFB;
      --bg-white: #FFFFFF;
      --border: #E5E7EB;
      --border-focus: #8B5CF6;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --radius: 8px;
      --radius-lg: 12px;
      --transition: 200ms ease;

      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      color: var(--text-primary);
      background-color: var(--bg-body);
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body { min-height: 100vh; }

    .app { max-width: 1200px; margin: 0 auto; }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 2rem 1.5rem;
      color: white;
      box-shadow: var(--shadow-md);
    }

    .header-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: white;
      line-height: 1.2;
    }

    .header-subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
      margin-top: 0.25rem;
    }

    /* Main */
    .main-content {
      padding: 2rem 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    /* Form */
    .add-course-section {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .course-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .form-group.full-width { grid-column: 1 / -1; }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .required { color: var(--danger); }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.625rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg-white);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
    }

    .form-group input.error,
    .form-group select.error,
    .form-group textarea.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .field-error {
      font-size: 0.75rem;
      color: var(--danger);
      min-height: 1rem;
    }

    .form-actions {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 0.75rem;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background-color var(--transition), transform var(--transition), box-shadow var(--transition);
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-primary { background-color: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background-color: var(--primary-dark); box-shadow: var(--shadow-md); }

    .btn-outline { background-color: var(--bg-white); color: var(--text-secondary); border-color: var(--border); }
    .btn-outline:hover:not(:disabled) { background-color: var(--bg-body); color: var(--text-primary); }

    .btn-edit { background-color: var(--primary-bg); color: var(--primary); border-color: var(--primary-light); }
    .btn-edit:hover:not(:disabled) { background-color: var(--primary-light); color: white; }

    .btn-delete { background-color: var(--danger-bg); color: var(--danger); border-color: var(--danger-light); }
    .btn-delete:hover:not(:disabled) { background-color: var(--danger); color: white; }

    .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; }

    /* Spinner */
    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    .large-spinner {
      width: 2.5rem;
      height: 2.5rem;
      border-width: 3px;
      border-color: rgba(139,92,246,0.2);
      border-top-color: var(--primary);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Loading overlay */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 3rem;
      color: var(--text-secondary);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Course list */
    .course-list-section {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .list-header .section-title { margin-bottom: 0; }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .filter-group select {
      padding: 0.375rem 0.625rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      color: var(--text-primary);
      background: var(--bg-white);
      outline: none;
    }

    .filter-group select:focus { border-color: var(--border-focus); }

    /* Course grid */
    .course-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    /* Course card */
    .course-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      transition: box-shadow var(--transition), border-color var(--transition);
    }

    .course-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary-light);
    }

    .course-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .course-name {
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .course-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .course-description {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .course-meta {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .course-meta-item {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .meta-label { font-weight: 500; color: var(--text-secondary); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-not-started { background-color: #F3F4F6; color: #6B7280; }
    .status-in-progress { background-color: var(--primary-bg); color: var(--primary); }
    .status-completed { background-color: var(--success-bg); color: #B45309; }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      max-width: 360px;
      color: white;
    }

    .toast-success { background-color: var(--success); color: #1E1B4B; }
    .toast-error { background-color: var(--danger); }
    .toast-info { background-color: var(--primary); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalSlide 0.25s ease;
    }

    @keyframes modalSlide {
      from { transform: translateY(1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .modal-header h3 { font-size: 1.125rem; font-weight: 600; }

    .modal-close {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: var(--bg-body);
      border-radius: 50%;
      font-size: 1.25rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background-color var(--transition);
    }

    .modal-close:hover { background-color: var(--border); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.8125rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 1.5rem 1rem; }
      .header-title { font-size: 1.375rem; }
      .main-content { padding: 1.25rem 1rem; }
      .form-row { grid-template-columns: 1fr; }
      .course-card-header { flex-direction: column; }
      .course-actions { align-self: flex-end; }
      .course-meta { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .list-header { flex-direction: column; align-items: flex-start; }
      .toast-container { top: 0.75rem; right: 0.75rem; left: 0.75rem; }
      .toast { max-width: 100%; }
    }

    @media (min-width: 769px) {
      .course-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1 class="header-title">CodeCraftHub</h1>
        <p class="header-subtitle">Your Learning Management Platform</p>
      </div>
    </header>

    <main class="main-content">
      <!-- Add Course Form -->
      <section class="add-course-section">
        <h2 class="section-title">Add New Course</h2>
        <form id="course-form" class="course-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="course-name">Course Name <span class="required">*</span></label>
              <input type="text" id="course-name" name="name" placeholder="Enter course name" required />
              <span class="field-error" id="name-error"></span>
            </div>
            <div class="form-group">
              <label for="course-status">Status <span class="required">*</span></label>
              <select id="course-status" name="status" required>
                <option value="">Select status</option>
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
              <span class="field-error" id="status-error"></span>
            </div>
          </div>
          <div class="form-group full-width">
            <label for="course-description">Description <span class="required">*</span></label>
            <textarea id="course-description" name="description" placeholder="Enter course description" rows="3" required></textarea>
            <span class="field-error" id="description-error"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="course-target-date">Target Date <span class="required">*</span></label>
              <input type="date" id="course-target-date" name="target_date" required />
              <span class="field-error" id="target_date-error"></span>
            </div>
            <div class="form-group form-actions">
              <button type="submit" class="btn btn-primary" id="submit-btn">
                <span class="btn-text">Add Course</span>
                <span class="btn-spinner spinner" style="display:none;"></span>
              </button>
              <button type="reset" class="btn btn-outline">Clear</button>
            </div>
          </div>
        </form>
      </section>

      <!-- Toast container -->
      <div class="toast-container" id="toast-container"></div>

      <!-- Course List -->
      <section class="course-list-section">
        <div class="list-header">
          <h2 class="section-title">Your Courses</h2>
          <div class="filter-group">
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter">
              <option value="All">All</option>
              <option value="Not Started">Not Started</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="loading-overlay" id="loading-overlay" style="display:none;">
          <div class="spinner large-spinner"></div>
          <p>Loading courses...</p>
        </div>

        <div class="empty-state" id="empty-state" style="display:none;">
          <p>No courses found. Add your first course above!</p>
        </div>

        <div class="course-grid" id="course-grid"></div>
      </section>
    </main>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3>Edit Course</h3>
          <button class="modal-close" id="modal-close-btn" aria-label="Close">&times;</button>
        </div>
        <form id="edit-form" class="course-form" novalidate>
          <input type="hidden" id="edit-course-id" />
          <div class="form-row">
            <div class="form-group">
              <label for="edit-name">Course Name <span class="required">*</span></label>
              <input type="text" id="edit-name" name="name" required />
              <span class="field-error" id="edit-name-error"></span>
            </div>
            <div class="form-group">
              <label for="edit-status">Status <span class="required">*</span></label>
              <select id="edit-status" name="status" required>
                <option value="">Select status</option>
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
              <span class="field-error" id="edit-status-error"></span>
            </div>
          </div>
          <div class="form-group full-width">
            <label for="edit-description">Description <span class="required">*</span></label>
            <textarea id="edit-description" name="description" rows="3" required></textarea>
            <span class="field-error" id="edit-description-error"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="edit-target-date">Target Date <span class="required">*</span></label>
              <input type="date" id="edit-target-date" name="target_date" required />
              <span class="field-error" id="edit-target_date-error"></span>
            </div>
            <div class="form-group form-actions">
              <button type="submit" class="btn btn-primary" id="edit-submit-btn">
                <span class="btn-text">Save Changes</span>
                <span class="btn-spinner spinner" style="display:none;"></span>
              </button>
              <button type="button" class="btn btn-outline" id="edit-cancel-btn">Cancel</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 CodeCraftHub. All rights reserved.</p>
    </footer>
  </div>

  <script>
    // === CONFIGURATION ===
    // Change this to match your backend API base URL
    const API_BASE = 'https://adityakothar-5000.theianext-0-labs-prod-misc-tools-us-east-0.proxy.cognitiveclass.ai/api/courses';

    // === STATE ===
    const state = { courses: [], filter: 'All', loading: false };

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    // === UTILITIES ===
    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function statusClass(status) {
      if (status === 'In Progress') return 'status-in-progress';
      if (status === 'Completed') return 'status-completed';
      return 'status-not-started';
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      if (!str) return '';
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // === TOAST NOTIFICATIONS ===
    function showToast(message, type = 'info') {
      const container = $('#toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // === LOADING STATES ===
    function setLoading(loading) {
      state.loading = loading;
      $('#loading-overlay').style.display = loading ? 'flex' : 'none';
      $('#course-grid').style.display = loading ? 'none' : 'grid';
    }

    function setButtonLoading(btn, loading) {
      const textEl = btn.querySelector('.btn-text');
      const spinnerEl = btn.querySelector('.btn-spinner');
      btn.disabled = loading;
      if (textEl) textEl.style.display = loading ? 'none' : 'inline';
      if (spinnerEl) spinnerEl.style.display = loading ? 'inline-block' : 'none';
    }

    // === FORM VALIDATION ===
    function validateForm(prefix) {
      const fields = [
        { name: 'name', label: 'Course name' },
        { name: 'description', label: 'Description' },
        { name: 'target_date', label: 'Target date' },
        { name: 'status', label: 'Status' },
      ];
      let valid = true;

      fields.forEach(({ name, label }) => {
        const inputId = prefix + (name === 'target_date' ? 'target-date' : name);
        const errorId = prefix + name + '-error';
        const input = $('#' + inputId);
        const errorEl = $('#' + errorId);
        if (!input || !errorEl) return;

        const value = input.value.trim();
        if (!value) {
          input.classList.add('error');
          errorEl.textContent = label + ' is required';
          valid = false;
        } else {
          input.classList.remove('error');
          errorEl.textContent = '';
        }
      });

      return valid;
    }

    function clearValidation(prefix) {
      const fields = ['name', 'description', 'target-date', 'status'];
      fields.forEach((f) => {
        const input = $('#' + prefix + f);
        const errName = f.replace('target-date', 'target_date');
        const errorEl = $('#' + prefix + errName + '-error');
        if (input) input.classList.remove('error');
        if (errorEl) errorEl.textContent = '';
      });
    }

    function getFormData(prefix) {
      return {
        name: $('#' + prefix + 'name').value.trim(),
        description: $('#' + prefix + 'description').value.trim(),
        target_date: $('#' + prefix + 'target-date').value,
        status: $('#' + prefix + 'status').value,
      };
    }

    // === API CALLS ===
    async function apiCall(url, options = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || 'HTTP ' + res.status);
      }
      return data;
    }

    async function fetchCourses() {
      setLoading(true);
      try {
        const data = await apiCall(API_BASE);
        state.courses = Array.isArray(data) ? data : data.courses || [];
        renderCourses();
      } catch (err) {
        showToast('Failed to load courses: ' + err.message, 'error');
        state.courses = [];
        renderCourses();
      } finally {
        setLoading(false);
      }
    }

    async function createCourse(data) {
      const btn = $('#submit-btn');
      setButtonLoading(btn, true);
      try {
        await apiCall(API_BASE, { method: 'POST', body: JSON.stringify(data) });
        showToast('Course added successfully!', 'success');
        $('#course-form').reset();
        clearValidation('');
        await fetchCourses();
      } catch (err) {
        showToast('Failed to add course: ' + err.message, 'error');
      } finally {
        setButtonLoading(btn, false);
      }
    }

    async function updateCourse(id, data) {
      const btn = $('#edit-submit-btn');
      setButtonLoading(btn, true);
      try {
        await apiCall(API_BASE + '/' + id, { method: 'PUT', body: JSON.stringify(data) });
        showToast('Course updated successfully!', 'success');
        closeModal();
        await fetchCourses();
      } catch (err) {
        showToast('Failed to update course: ' + err.message, 'error');
      } finally {
        setButtonLoading(btn, false);
      }
    }

    async function deleteCourse(id, name) {
      if (!confirm('Are you sure you want to delete "' + name + '"?')) return;
      try {
        await apiCall(API_BASE + '/' + id, { method: 'DELETE' });
        showToast('Course deleted successfully!', 'success');
        await fetchCourses();
      } catch (err) {
        showToast('Failed to delete course: ' + err.message, 'error');
      }
    }

    // === RENDERING ===
    function renderCourses() {
      const grid = $('#course-grid');
      const emptyState = $('#empty-state');
      const filtered = state.filter === 'All'
        ? state.courses
        : state.courses.filter((c) => c.status === state.filter);

      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyState.style.display = 'block';
        emptyState.querySelector('p').textContent =
          state.courses.length === 0
            ? 'No courses found. Add your first course above!'
            : 'No courses with status "' + state.filter + '".';
        return;
      }

      emptyState.style.display = 'none';
      grid.innerHTML = filtered.map((c) => [
        '<div class="course-card" data-id="' + c.id + '">',
        '  <div class="course-card-header">',
        '    <h3 class="course-name">' + escapeHtml(c.name) + '</h3>',
        '    <div class="course-actions">',
        '      <button class="btn btn-edit btn-sm" data-action="edit" data-id="' + c.id + '">Edit</button>',
        '      <button class="btn btn-delete btn-sm" data-action="delete" data-id="' + c.id + '" data-name="' + escapeAttr(c.name) + '">Remove</button>',
        '    </div>',
        '  </div>',
        '  <p class="course-description">' + escapeHtml(c.description) + '</p>',
        '  <div class="course-meta">',
        '    <span class="course-meta-item"><span class="meta-label">Target:</span> ' + formatDate(c.target_date) + '</span>',
        '    <span class="course-meta-item"><span class="status-badge ' + statusClass(c.status) + '">' + escapeHtml(c.status) + '</span></span>',
        '    <span class="course-meta-item"><span class="meta-label">Created:</span> ' + formatDate(c.created_at) + '</span>',
        '  </div>',
        '</div>'
      ].join('\n')).join('');
    }

    // === EDIT MODAL ===
    function openEditModal(course) {
      $('#edit-course-id').value = course.id;
      $('#edit-name').value = course.name || '';
      $('#edit-description').value = course.description || '';
      $('#edit-target-date').value = course.target_date || '';
      $('#edit-status').value = course.status || '';
      clearValidation('edit-');
      $('#edit-modal').style.display = 'flex';
    }

    function closeModal() {
      $('#edit-modal').style.display = 'none';
    }

    function findCourse(id) {
      return state.courses.find((c) => c.id == id);
    }

    // === EVENT LISTENERS ===
    document.addEventListener('DOMContentLoaded', () => {
      // Add course form
      $('#course-form').addEventListener('submit', (e) => {
        e.preventDefault();
        if (!validateForm('')) return;
        createCourse(getFormData(''));
      });

      $('#course-form').addEventListener('reset', () => clearValidation(''));

      // Edit form
      $('#edit-form').addEventListener('submit', (e) => {
        e.preventDefault();
        if (!validateForm('edit-')) return;
        const id = $('#edit-course-id').value;
        updateCourse(id, getFormData('edit-'));
      });

      // Modal close buttons
      $('#modal-close-btn').addEventListener('click', closeModal);
      $('#edit-cancel-btn').addEventListener('click', closeModal);
      $('#edit-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
      });

      // Status filter
      $('#status-filter').addEventListener('change', (e) => {
        state.filter = e.target.value;
        renderCourses();
      });

      // Delegate clicks on course grid (Edit / Remove buttons)
      $('#course-grid').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (action === 'edit') {
          const course = findCourse(id);
          if (course) openEditModal(course);
        } else if (action === 'delete') {
          deleteCourse(id, btn.dataset.name);
        }
      });

      // Clear validation on input
      $$('#course-form input, #course-form select, #course-form textarea').forEach((el) => {
        el.addEventListener('input', () => {
          el.classList.remove('error');
          const errName = el.name;
          const errorEl = $('#' + errName + '-error');
          if (errorEl) errorEl.textContent = '';
        });
      });

      // Load courses on page load
      fetchCourses();
    });
  </script>
</body>
</html>
